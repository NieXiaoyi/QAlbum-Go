server:
  port: 8080
  read_timeout: 60
  write_timeout: 60
  env: production

storage:
  base_path: ./data

jwt:
  secret: your-secret-key-here-change-in-production
  expire_hour: 720

wechat:
  app_id: your-wechat-appid
  secret: your-wechat-secret

task:
  worker_count: 4
  queue_size: 1000
  cover_semaphore: 2
  cover_timeout: 30

backup:
  enabled: true
  upload_grace_hours: 24

cleanup:
  enabled: true
  hour: 3

audit:
  enabled: true
  interval_hours: 6
